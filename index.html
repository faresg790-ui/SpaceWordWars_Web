<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpaceWordWars</title>
    
    <script src="https://accounts.google.com/gsi/client?hl=ar" async defer></script>

    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #0a0a0a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: sans-serif; 
            touch-action: none; 
        }

        #unity-container { 
            position: relative; 
            height: 100vh; 
            width: 56.25vh; 
            max-width: 100vw; 
            box-shadow: 0px 0px 50px rgba(0, 0, 0, 0.9); 
            background-color: #000000; 
        }

        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            display: block; 
            outline: none; 
        }

        #google-overlay-container {
            display: none; 
            position: absolute;
            left: 50%;
            top: 43%; 
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        #unity-loading-bar { 
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); 
            display: none; text-align: center;
        }
        #unity-logo { 
            width: 154px; height: 130px; margin: 0 auto;
            background: url('TemplateData/unity-logo-dark.png') no-repeat center; 
        }
        #unity-progress-bar-empty { 
            width: 141px; height: 18px; margin-top: 10px; margin-left: auto; margin-right: auto;
            background: url('TemplateData/progress-bar-empty-dark.png') no-repeat center; 
        }
        #unity-progress-bar-full { 
            width: 0%; height: 18px; 
            background: url('TemplateData/progress-bar-full-dark.png') no-repeat center; 
        }
        #unity-progress-text {
            color: white; font-size: 16px; font-weight: bold; margin-top: 8px;
        }
        
        #unity-warning { 
            position: absolute; left: 50%; top: 5%; transform: translateX(-50%); 
            background: white; padding: 10px; display: none; z-index: 99; text-align: center; 
        }
    </style>
  </head>
  <body>
    
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      
      <div id="google-overlay-container">
          <div id="g_id_onload"
               data-client_id="803682442327-5stb9brbu6dlsfq2oklpl7bbml14pfsd.apps.googleusercontent.com"
               data-callback="handleGoogleLoginCallback"
               data-auto_prompt="false">
          </div>
          <div class="g_id_signin"
               data-type="standard"
               data-size="large"
               data-theme="filled_black"
               data-text="sign_in_with"
               data-shape="rectangular"
               data-logo_alignment="left"
               data-locale="ar">
          </div>
      </div>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div id="unity-progress-text">0%</div>
      </div>
      
      <div id="unity-warning"> </div>
    </div>

    <div id="dev-lock-screen" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background-color:#0a0a0a; z-index:99999; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif;">
        <h2 style="color:white; margin-bottom:20px;">الموقع مغلق للتطوير</h2>
        <input type="password" id="dev-pwd" placeholder="أدخل كلمة المرور" style="padding:15px; width:250px; font-size:18px; text-align:center; border-radius:8px; border:none; margin-bottom:15px; outline:none;">
        <button onclick="unlockSite()" style="padding:12px 30px; font-size:18px; background-color:#d32f2f; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">دخول</button>
        <p id="pwd-error" style="color:#ff5555; margin-top:15px; display:none;">كلمة المرور خاطئة!</p>

        <script>
            function unlockSite() {
                var pwd = document.getElementById("dev-pwd").value;
                if (pwd === "1234") {
                    document.getElementById("dev-lock-screen").style.display = "none";
                } else {
                    document.getElementById("pwd-error").style.display = "block";
                }
            }
        </script>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");
      var unityGameInstance = null;

      window.ToggleGoogleOverlay = function(show) {
          var overlay = document.getElementById('google-overlay-container');
          if (overlay) {
              overlay.style.display = show ? 'block' : 'none';
          }
      };

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() { 
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none'; 
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px; color: white;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px; color: black;';
          setTimeout(function() { 
            warningBanner.removeChild(div); 
            updateBannerVisibility(); 
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var cacheBuster = "?v=" + Date.now();
      
      var loaderUrl = buildUrl + "/SpaceWordWars_Web.loader.js" + cacheBuster;
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/SpaceWordWars_Web.data.unityweb" + cacheBuster,
        frameworkUrl: buildUrl + "/SpaceWordWars_Web.framework.js.unityweb" + cacheBuster,
        codeUrl: buildUrl + "/SpaceWordWars_Web.wasm.unityweb" + cacheBuster,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "SpaceWordWars",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
          document.querySelector("#unity-progress-text").innerText = Math.floor(progress * 100) + "%";
        }).then((unityInstance) => {
          unityGameInstance = unityInstance; 
          document.querySelector("#unity-loading-bar").style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);

      function handleGoogleLoginCallback(response) {
          if (unityGameInstance != null) {
              window.ToggleGoogleOverlay(false);
              
              // --- CRITICAL FIX: Wake up Unity! ---
              // When the Google popup closes, force the browser to focus on the game canvas
              // so Unity doesn't stay permanently paused in the background.
              setTimeout(function() {
                  window.focus();
                  if (canvas) canvas.focus();
              }, 150);

              try {
                  unityGameInstance.SendMessage('AuthManager', 'OnWebGLAuthSuccess', response.credential);
              } catch (err) {
                  alert("⚠️ FATAL ERROR: Unity could not find a GameObject named 'AuthManager'. Error: " + err.message);
              }
          }
      }
    </script>
  </body>
</html>
