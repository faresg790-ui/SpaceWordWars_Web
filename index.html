<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>WordWars</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        /* --- ZTYPE STYLE WRAPPER --- */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #0a0a0a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: sans-serif; 
        }

        #unity-container { 
            position: relative; 
            width: 100%; 
            max-width: 50vh; 
            height: 100vh; 
            box-shadow: 0px 0px 50px rgba(0, 0, 0, 0.9); 
            background-color: #000000; 
        }

        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            display: block; 
            outline: none; 
        }

        /* --- LOADING BAR CENTERING --- */
        #unity-loading-bar { 
            position: absolute; 
            left: 50%; 
            top: 50%; 
            transform: translate(-50%, -50%); 
            display: none; 
        }
        #unity-logo { 
            width: 154px; 
            height: 130px; 
            background: url('TemplateData/unity-logo-dark.png') no-repeat center; 
        }
        #unity-progress-bar-empty { 
            width: 141px; 
            height: 18px; 
            margin-top: 10px; 
            margin-left: 6.5px; 
            background: url('TemplateData/progress-bar-empty-dark.png') no-repeat center; 
        }
        #unity-progress-bar-full { 
            width: 0%; 
            height: 18px; 
            margin-top: 10px; 
            background: url('TemplateData/progress-bar-full-dark.png') no-repeat center; 
        }
        
        /* --- ERROR BANNER --- */
        #unity-warning { 
            position: absolute; 
            left: 50%; 
            top: 5%; 
            transform: translateX(-50%); 
            background: white; 
            padding: 10px; 
            display: none; 
            z-index: 99; 
            text-align: center; 
        }
    </style>
  </head>
  <body>
    
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      
      <div id="unity-warning"> </div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");
      
      // CREATE A GLOBAL VARIABLE TO HOLD THE UNITY ENGINE
      var unityGameInstance = null;

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() { 
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none'; 
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px; color: white;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px; color: black;';
          setTimeout(function() { 
            warningBanner.removeChild(div); 
            updateBannerVisibility(); 
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/SpaceWordWars_Web.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/SpaceWordWars_Web.data.unityweb",
        frameworkUrl: buildUrl + "/SpaceWordWars_Web.framework.js.unityweb",
        codeUrl: buildUrl + "/SpaceWordWars_Web.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "WordWars",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          
          // SAVE THE UNITY ENGINE INSTANCE
          unityGameInstance = unityInstance; 
          document.querySelector("#unity-loading-bar").style.display = "none";

          // INITIALIZE GOOGLE WITH YOUR CLIENT ID
          if (typeof google !== 'undefined') {
              google.accounts.id.initialize({
                client_id: "803682442327-5stb9brbu6dlsfq2oklpl7bbml14pfsd.apps.googleusercontent.com",
                callback: handleGoogleLoginCallback
              });
          }

        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);

      // THE CALLBACK FUNCTION: Sends the Google Token back to C#!
      function handleGoogleLoginCallback(response) {
          if (unityGameInstance != null) {
              unityGameInstance.SendMessage('AuthManager', 'OnWebGLAuthSuccess', response.credential);
          }
      }
    </script>
  </body>
</html>
