<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>SpaceWordWars</title>
    
    <script src="https://accounts.google.com/gsi/client?hl=ar" async defer></script>

    <style>
        /* --- ZTYPE VERTICAL WRAPPER --- */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #0a0a0a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: sans-serif; 
        }

        #unity-container { 
            position: relative; 
            width: 100%; 
            max-width: 540px; 
            height: 100vh; 
            box-shadow: 0px 0px 50px rgba(0, 0, 0, 0.9); 
            background-color: #000000; 
        }

        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            display: block; 
            outline: none; 
        }

        /* --- THE GOOGLE NATIVE OVERLAY --- */
        #google-overlay-container {
            display: none; 
            position: absolute;
            left: 50%;
            top: 48%; 
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        /* --- LOADING BAR CENTERING & TEXT --- */
        #unity-loading-bar { 
            position: absolute; 
            left: 50%; 
            top: 50%; 
            transform: translate(-50%, -50%); 
            display: none; 
            text-align: center;
        }
        #unity-logo { 
            width: 154px; 
            height: 130px; 
            background: url('TemplateData/unity-logo-dark.png') no-repeat center; 
            margin: 0 auto;
        }
        #unity-progress-bar-empty { 
            width: 141px; 
            height: 18px; 
            margin-top: 10px; 
            margin-left: auto;
            margin-right: auto;
            background: url('TemplateData/progress-bar-empty-dark.png') no-repeat center; 
        }
        #unity-progress-bar-full { 
            width: 0%; 
            height: 18px; 
            background: url('TemplateData/progress-bar-full-dark.png') no-repeat center; 
        }
        #unity-progress-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin-top: 8px;
        }
        
        /* --- ERROR BANNER --- */
        #unity-warning { 
            position: absolute; 
            left: 50%; 
            top: 5%; 
            transform: translateX(-50%); 
            background: white; 
            padding: 10px; 
            display: none; 
            z-index: 99; 
            text-align: center; 
        }
    </style>
  </head>
  <body>
    
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      
      <div id="google-overlay-container">
          <div id="g_id_onload"
               data-client_id="803682442327-5stb9brbu6dlsfq2oklpl7bbml14pfsd.apps.googleusercontent.com"
               data-callback="handleGoogleLoginCallback"
               data-auto_prompt="false">
          </div>
          <div class="g_id_signin"
               data-type="standard"
               data-size="large"
               data-theme="outline"
               data-text="sign_in_with"
               data-shape="rectangular"
               data-logo_alignment="left"
               data-locale="ar">
          </div>
      </div>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div id="unity-progress-text">0%</div>
      </div>
      
      <div id="unity-warning"> </div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");
      var unityGameInstance = null;

      window.ToggleGoogleOverlay = function(show) {
          var overlay = document.getElementById('google-overlay-container');
          if (overlay) {
              overlay.style.display = show ? 'block' : 'none';
          }
      };

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() { 
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none'; 
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px; color: white;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px; color: black;';
          setTimeout(function() { 
            warningBanner.removeChild(div); 
            updateBannerVisibility(); 
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/SpaceWordWars_Web.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/SpaceWordWars_Web.data.unityweb",
        frameworkUrl: buildUrl + "/SpaceWordWars_Web.framework.js.unityweb",
        codeUrl: buildUrl + "/SpaceWordWars_Web.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "SpaceWordWars",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
          document.querySelector("#unity-progress-text").innerText = Math.floor(progress * 100) + "%";
        }).then((unityInstance) => {
          unityGameInstance = unityInstance; 
          document.querySelector("#unity-loading-bar").style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);

      function handleGoogleLoginCallback(response) {
          if (unityGameInstance != null) {
              window.ToggleGoogleOverlay(false);
              unityGameInstance.SendMessage('AuthManager', 'OnWebGLAuthSuccess', response.credential);
          }
      }
    </script>
  </body>
</html>
