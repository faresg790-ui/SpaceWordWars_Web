<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SpaceWordWars</title>
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">
    <link rel="shortcut icon" href="apple-touch-icon.png">

    <script src="https://accounts.google.com/gsi/client?hl=en" async defer></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3574498512943405" crossorigin="anonymous"></script>

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background-color: #0a0a0a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: sans-serif; 
        }

        /* 📱 MOBILE BLOCK SCREEN 📱 */
        #mobile-block-screen {
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: #0a0a0a;
            color: white;
            width: 100vw;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            z-index: 9999;
        }
        #mobile-block-screen h2 { 
            color: #00ffcc; 
            margin-bottom: 10px; 
            font-size: 24px;
            line-height: 1.6;
        }

        #master-layout {
            display: flex;
            justify-content: center; 
            align-items: center;
            width: 100vw;
            height: 100vh;
            position: relative; 
        }

        .side-ad-container {
            width: 300px; 
            position: absolute; 
            top: 0;
            bottom: 0; 
            background-color: #111; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .side-ad-left { left: 0; }
        .side-ad-right { right: 0; }

        @media (max-width: 1200px) {
            .side-ad-container { display: none !important; }
        }

        /* 🚀 STRICT ASPECT RATIO ENFORCEMENT 🚀 */
        #unity-container { 
            position: relative; 
            box-shadow: 0px 0px 50px rgba(0, 0, 0, 0.9); 
            background-color: #000000; 
            z-index: 10; 
            
            height: 100vh;
            max-height: 100vh;
            width: auto;
            aspect-ratio: 760 / 1080;
            max-width: 100vw;
        }

        canvas { width: 100% !important; height: 100% !important; display: block; outline: none; }

        #google-overlay-container { display: none; position: absolute; left: 50%; top: 43%; transform: translate(-50%, -50%); z-index: 100; }
        #unity-loading-bar { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); text-align: center; width: 250px; z-index: 999; }
        #unity-progress-bar-empty { width: 100%; height: 20px; background-color: #222; border: 2px solid #555; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        #unity-progress-bar-full { width: 0%; height: 100%; background-color: #00ffcc; border-radius: 8px; transition: width 0.1s ease; }
        #unity-progress-text { color: white; font-size: 18px; font-weight: bold; margin-top: 10px; font-family: sans-serif; display: flex; justify-content: center; gap: 5px; }
        
        #unity-progress-bytes {
            color: #aaaaaa;
            font-size: 13px;
            margin-top: 8px;
            font-family: monospace; 
        }

        #unity-warning { position: absolute; left: 50%; top: 5%; transform: translateX(-50%); background: white; padding: 10px; display: none; z-index: 99; text-align: center; }
    </style>
  </head>
  <body>
    
    <div id="mobile-block-screen">
        <h2>To play the game, please download it from the App Store, or use a desktop computer.</h2>
    </div>

    <div id="master-layout">
        <div class="side-ad-container side-ad-left">
            <ins class="adsbygoogle" style="display:block; width:100%; height:100%;" data-ad-client="ca-pub-3574498512943405" data-ad-slot="1748652393" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <div id="unity-container">
          <canvas id="unity-canvas" tabindex="-1"></canvas>
          <div id="google-overlay-container">
              <div id="g_id_onload" data-client_id="803682442327-5stb9brbu6dlsfq2oklpl7bbml14pfsd.apps.googleusercontent.com" data-callback="handleGoogleLoginCallback" data-auto_prompt="false"></div>
              <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_black" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left" data-locale="en"></div>
          </div>
          
          <div id="unity-loading-bar">
            <div id="unity-progress-text"><span>Loading...</span> <span id="unity-percent">0%</span></div> 
            <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
            <div id="unity-progress-bytes">0.00 MB / 0.00 MB</div>
          </div>

          <div id="unity-warning"> </div>
        </div>

        <div class="side-ad-container side-ad-right">
            <ins class="adsbygoogle" style="display:block; width:100%; height:100%;" data-ad-client="ca-pub-3574498512943405" data-ad-slot="9970969372" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </div> 

    <script>
      function isMobileDevice() {
          return (typeof window.orientation !== "undefined") || 
                 (navigator.userAgent.indexOf('IEMobile') !== -1) || 
                 (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) ||
                 (navigator.maxTouchPoints > 0 && window.innerWidth <= 1024);
      }

      if (isMobileDevice()) {
          document.getElementById('master-layout').style.display = 'none';
          document.getElementById('mobile-block-screen').style.display = 'flex';
      } else {
          document.addEventListener('wheel', function(e) { if (e.ctrlKey) { e.preventDefault(); } }, { passive: false });
          document.addEventListener('keydown', function(e) { if (e.ctrlKey && (e.key === '=' || e.key === '-' || e.key === '0')) { e.preventDefault(); } }, { passive: false });

          var canvas = document.querySelector("#unity-canvas");
          var unityGameInstance = null;

          window.ToggleGoogleOverlay = function(show) {
              var overlay = document.getElementById('google-overlay-container');
              if (overlay) { overlay.style.display = show ? 'block' : 'none'; }
          };

          function unityShowBanner(msg, type) {
            var warningBanner = document.querySelector("#unity-warning");
            function updateBannerVisibility() { warningBanner.style.display = warningBanner.children.length ? 'block' : 'none'; }
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px; color: white;';
            else {
              if (type == 'warning') div.style = 'background: yellow; padding: 10px; color: black;';
              setTimeout(function() { warningBanner.removeChild(div); updateBannerVisibility(); }, 5000);
            }
            updateBannerVisibility();
          }

          var buildUrl = "Build";
          var cacheBuster = "?v=" + Date.now();
          var loaderUrl = buildUrl + "/SpaceWordWars_Web.loader.js" + cacheBuster;
          var config = {
            arguments: [],
            dataUrl: buildUrl + "/SpaceWordWars_Web.data.unityweb" + cacheBuster,
            frameworkUrl: buildUrl + "/SpaceWordWars_Web.framework.js.unityweb" + cacheBuster,
            codeUrl: buildUrl + "/SpaceWordWars_Web.wasm.unityweb" + cacheBuster,
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "SpaceWordWars",
            productVersion: "1.0",
            showBanner: unityShowBanner,
            devicePixelRatio: window.devicePixelRatio, 
          };

          document.querySelector("#unity-loading-bar").style.display = "block";

          var script = document.createElement("script");
          script.src = loaderUrl;
          script.onload = () => {
            let highestProgress = 0;
            
            // 🛑 Set the actual size of your Build folder here (in Megabytes) 🛑
            const ESTIMATED_TOTAL_MB = 35.0; 

            createUnityInstance(canvas, config, (progress) => {
              if (progress > highestProgress) {
                  highestProgress = progress;
                  let percent = Math.floor(highestProgress * 100);
                  
                  document.querySelector("#unity-progress-bar-full").style.width = percent + "%";
                  document.querySelector("#unity-percent").innerText = percent + "%";

                  let currentMB = (highestProgress * ESTIMATED_TOTAL_MB).toFixed(2);
                  document.querySelector("#unity-progress-bytes").innerText = currentMB + " MB / " + ESTIMATED_TOTAL_MB.toFixed(2) + " MB";
              }

              if (progress >= 1.0) { document.querySelector("#unity-loading-bar").style.display = "none"; }
            }).then((unityInstance) => {
              unityGameInstance = unityInstance; 
              document.querySelector("#unity-loading-bar").style.display = "none";
            }).catch((message) => {
              console.error("Unity Load Warning: ", message);
              document.querySelector("#unity-loading-bar").style.display = "none";
            });
          };
          document.body.appendChild(script);

          window.handleGoogleLoginCallback = function(response) {
              if (unityGameInstance != null) {
                  window.ToggleGoogleOverlay(false);
                  setTimeout(function() { window.focus(); if (canvas) canvas.focus(); }, 150);
                  try { unityGameInstance.SendMessage('AuthManager', 'OnWebGLAuthSuccess', response.credential); } 
                  catch (err) { console.error("⚠️ FATAL ERROR: " + err.message); }
              }
          };
      }
    </script>
  </body>
</html>
